name: .NET Desktop

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    name: Build
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        configuration: [Debug, Release]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Create CI NuGet config
        shell: pwsh
        run: |
          @'
          <?xml version="1.0" encoding="utf-8"?>
          <configuration>
            <packageSources>
              <clear />
              <add key="nuget.org" value="https://api.nuget.org/v3/index.json" />
            </packageSources>
          </configuration>
          '@ | Set-Content -Path NuGet.Actions.config -Encoding utf8

      - name: Restore
        run: dotnet restore PicShow.sln --configfile NuGet.Actions.config

      - name: Build
        run: dotnet build PicShow.sln --configuration ${{ matrix.configuration }} --no-restore

  publish:
    name: Publish win-x64
    runs-on: windows-latest
    needs: build
    if: github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Create CI NuGet config
        shell: pwsh
        run: |
          @'
          <?xml version="1.0" encoding="utf-8"?>
          <configuration>
            <packageSources>
              <clear />
              <add key="nuget.org" value="https://api.nuget.org/v3/index.json" />
            </packageSources>
          </configuration>
          '@ | Set-Content -Path NuGet.Actions.config -Encoding utf8

      - name: Publish
        run: >
          dotnet publish .\src\PicShow.App\PicShow.App.csproj
          --configuration Release
          --runtime win-x64
          --self-contained false
          --configfile NuGet.Actions.config
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          --output .\publish\win-x64

      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: PicShow-win-x64
          path: .\publish\win-x64\PicShow.exe
